# Core Modules
# Infrastructure modules for the Ratchet server

requires:
  plugins:
    - name: ratchet
      version: ">=1.0.0"

modules:
  # --- Config provider (injects env-based config into pipeline templates) ---
  - name: config-provider
    type: config.provider
    config:
      sources:
        - type: defaults
        - type: env
      schema:
        auth_secret:
          env: RATCHET_AUTH_SECRET
          required: false
          default: "ratchet-dev-secret-change-me"
          sensitive: true
          desc: "JWT auth middleware secret"
        login_token:
          env: RATCHET_LOGIN_TOKEN
          required: false
          default: "ratchet-dev-token-change-me-in-production"
          sensitive: true
          desc: "Static login token for dev auth"
        db_path:
          env: RATCHET_DB_PATH
          required: false
          default: "./data/ratchet.db"
          desc: "SQLite database file path"
        ai_provider:
          env: RATCHET_AI_PROVIDER
          required: false
          default: "mock"
          desc: "AI provider type: mock, test, anthropic, openai"
        ai_scenario_file:
          env: RATCHET_AI_SCENARIO
          required: false
          default: ""
          desc: "Path to scripted scenario YAML (used when ai_provider=test)"

  # --- HTTP server ---
  - name: ratchet-server
    type: http.server
    config:
      address: ":9090"
      readTimeout: "15s"
      writeTimeout: "15s"

  # --- HTTP router ---
  - name: ratchet-router
    type: http.router
    dependsOn: [ratchet-server]

  # --- CORS middleware ---
  - name: ratchet-cors
    type: http.middleware.cors
    config:
      allowedOrigins: ["*"]
      allowedMethods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      allowedHeaders: ["Content-Type", "Authorization"]
    dependsOn: [ratchet-router]

  # --- Rate limiter ---
  - name: ratchet-ratelimit
    type: http.middleware.ratelimit
    config:
      requestsPerMinute: 300
      burstSize: 50
    dependsOn: [ratchet-cors]

  # --- Auth middleware (JWT Bearer token check) ---
  - name: ratchet-auth-middleware
    type: http.middleware.auth
    config:
      authType: Bearer
      secret: '{{config "auth_secret"}}'
      excludePaths:
        - "/api/auth/login"
        - "/api/status"
        - "/events"
        - "/"
    dependsOn: [ratchet-ratelimit]

  # --- SQLite database ---
  - name: ratchet-db
    type: storage.sqlite
    config:
      dbPath: '{{config "db_path"}}'

  # --- Messaging broker (in-memory, for future inter-agent messaging) ---
  - name: ratchet-broker
    type: messaging.broker
    config:
      type: memory

  # --- Scheduler (cron job scheduling for scheduled triggers) ---
  - name: cronScheduler
    type: ratchet.scheduler
    config:
      cronExpression: "* * * * *"

  # --- CQRS generic query handler (for GET/read pipeline dispatch) ---
  - name: ratchet-queries
    type: api.query
    dependsOn: [ratchet-router]

  # --- CQRS generic command handler (for POST/PUT/PATCH/DELETE pipeline dispatch) ---
  - name: ratchet-commands
    type: api.command
    dependsOn: [ratchet-router]

  # --- AI provider (configurable via RATCHET_AI_PROVIDER env var) ---
  # Default: mock (dev). Set RATCHET_AI_PROVIDER=test + RATCHET_AI_SCENARIO for scripted E2E.
  # Set RATCHET_AI_PROVIDER=anthropic for production.
  # Uses the generic agent.provider module type from workflow-plugin-agent.
  - name: ratchet-ai
    type: agent.provider
    config:
      provider: '{{config "ai_provider"}}'
      scenario_file: '{{config "ai_scenario_file"}}'
      test_mode: scripted
      responses:
        - "Task acknowledged. Analyzing the problem..."
        - "I've identified the key issues. Here's my approach..."
        - "Implementation complete. The solution addresses all requirements."
        - "Running verification steps to confirm correctness..."
        - "All checks passed. Reporting back to the team."
      agents:
        - id: orchestrator
          name: Orchestrator
          role: lead
          system_prompt: "You are the lead orchestrator agent. Plan work, delegate tasks to team members, and ensure forward progress. Communicate clearly with your team and track task completion."
          provider: ""
          model: ""
          team_id: alpha
          is_lead: true
        - id: developer
          name: Developer
          role: developer
          system_prompt: "You are a software developer agent. Write clean, tested, well-documented code. Ask for clarification when requirements are ambiguous. Report progress to the orchestrator."
          provider: ""
          model: ""
          team_id: alpha
          is_lead: false
        - id: reviewer
          name: Reviewer
          role: reviewer
          system_prompt: "You are a code reviewer agent. Review code for correctness, performance, security issues, and style. Provide constructive feedback and approve changes when ready."
          provider: ""
          model: ""
          team_id: alpha
          is_lead: false
        - id: infrawatch
          name: InfraWatch
          role: infrastructure
          system_prompt: "You are an autonomous infrastructure monitoring and self-healing agent. Observe pod health across all namespaces with infra_health_check, detect anomalies (CrashLoopBackOff, OOMKilled, ImagePullBackOff, high restart counts), monitor deployment rollouts with deployment_status, and check resource utilization with k8s_top to predict capacity issues. Remediate issues using k8s_rollback, k8s_restart_pod, and k8s_scale. Learn from outcomes via memory to refine detection."
          provider: ""
          model: ""
          team_id: ""
          is_lead: false
        - id: devreview
          name: DevReview
          role: development
          system_prompt: "You are an autonomous code review and technical debt agent. Analyze Go codebases for quality issues using code_review (golangci-lint), measure complexity with code_complexity, and review diffs with code_diff_review. Use git_log_stats to identify hotspot files that change frequently and test_coverage to find untested code. Correlate hotspots with complexity to prioritize refactoring. Track recurring patterns in memory and recommend automation for frequently-seen issues."
          provider: ""
          model: ""
          team_id: ""
          is_lead: false
        - id: securityguard
          name: SecurityGuard
          role: security
          system_prompt: "You are an autonomous security compliance agent. Run platform security audits with security_scan, generate compliance reports tagged to CIS/OWASP/SOC2 frameworks with compliance_report, scan for dependency vulnerabilities with vuln_check, and audit secrets for rotation needs with secret_audit. Track remediation status over time in memory and identify recurring vulnerabilities."
          provider: ""
          model: ""
          team_id: ""
          is_lead: false
        - id: dataanalyst
          name: DataAnalyst
          role: data
          system_prompt: "You are an autonomous database health and data quality agent. Monitor database integrity with db_health_check, inspect schema structure for changes with schema_inspect, profile data quality (null rates, cardinality, distributions) with data_profile, and analyze query performance with db_analyze. Use memory to track which optimizations were effective and detect schema drift between runs."
          provider: ""
          model: ""
          team_id: ""
          is_lead: false

  # --- Tool policy engine (default: allow for development; set deny + explicit policies for production) ---
  - name: ratchet-tool-policy
    type: ratchet.tool_policy_engine
    config:
      default_policy: allow

  # --- SSE hub (real-time Server-Sent Events for the UI) ---
  - name: ratchet-sse
    type: ratchet.sse_hub
    config:
      path: "/events"
    dependsOn: [ratchet-server]

  # --- MCP Client (connects to external MCP servers) ---
  - name: ratchet-mcp-client
    type: ratchet.mcp_client
    config:
      servers: []
    dependsOn: [ratchet-db]

  # --- MCP Server (exposes Ratchet APIs as MCP tools) ---
  - name: ratchet-mcp-server
    type: ratchet.mcp_server
    config:
      path: "/mcp"
    dependsOn: [ratchet-server, ratchet-db]

  # --- Static file server (serves React UI) ---
  - name: ratchet-ui
    type: static.fileserver
    config:
      root: "./ui/dist"
      prefix: "/"
      spaFallback: true
      cacheMaxAge: 0
      router: ratchet-router
    dependsOn: [ratchet-router]
