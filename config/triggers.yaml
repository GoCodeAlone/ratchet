# Triggers
# Schedule-based triggers for background processing

triggers:
  schedule:
    jobs:
      - cron: "* * * * *"
        workflow: "pipeline:agent-tick"
        action: "tick"
      - cron: "*/5 * * * *"
        workflow: "pipeline:infra-monitor"
        action: "health-check"
      - cron: "*/10 * * * *"
        workflow: "pipeline:dev-review"
        action: "code-review"
      - cron: "*/30 * * * *"
        workflow: "pipeline:security-monitor"
        action: "security-scan"
      - cron: "*/15 * * * *"
        workflow: "pipeline:data-monitor"
        action: "data-analysis"
